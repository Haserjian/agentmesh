name: Assay Pilot

on:
  workflow_dispatch:
    inputs:
      test_cmd:
        description: "Test command"
        required: false
        type: string
        default: "python -c print(0)"
      mode:
        description: "Scan mode"
        required: false
        type: choice
        options:
          - high-only
          - high+medium
        default: "high-only"

jobs:
  pilot:
    uses: Haserjian/ccio/.github/workflows/assay-pilot.yml@main
    with:
      test_cmd: ${{ inputs.test_cmd || 'python -c print(0)' }}
      mode: ${{ inputs.mode || 'high-only' }}
      python_version: "3.12"
