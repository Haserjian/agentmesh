name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  public-private-guard:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Block private artifacts in PR diff
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          if [ -z "$CHANGED" ]; then
            echo "No changed files."
            exit 0
          fi
          echo "Changed files:"
          echo "$CHANGED"
          git diff --name-only -z "$BASE_SHA" "$HEAD_SHA" | xargs -0 agentmesh classify --fail-on-private

  release-check-preview:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run release-check preview on PR diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          base = os.environ["BASE_SHA"]
          head = os.environ["HEAD_SHA"]
          summary_path = Path(os.environ.get("GITHUB_STEP_SUMMARY", ""))
          changed = subprocess.run(
              ["git", "diff", "--name-only", base, head],
              capture_output=True,
              text=True,
              check=True,
          ).stdout.splitlines()

          out_path = Path(".release-check.json")
          if not changed:
              payload = {"release_check": {"ok": True, "exit_code": 0, "skipped": "no_changed_files"}}
              out_path.write_text(json.dumps(payload, indent=2) + "\n")
              print(out_path.read_text())
              if summary_path:
                  with summary_path.open("a") as f:
                      f.write("### release-check preview (advisory)\n")
                      f.write("- result: `skipped (no changed files)`\n")
              raise SystemExit(0)

          cmd = ["agentmesh", "release-check", "--json", *changed]
          print("Running:", " ".join(cmd))
          proc = subprocess.run(cmd, capture_output=True, text=True)
          stdout = proc.stdout.strip()
          stderr = proc.stderr.strip()
          if stdout:
              print(stdout)
          if stderr:
              print(stderr)

          payload: dict
          if stdout:
              try:
                  payload = json.loads(stdout)
              except json.JSONDecodeError:
                  payload = {"release_check": {"ok": False, "exit_code": proc.returncode, "raw_stdout": stdout}}
          else:
              payload = {"release_check": {"ok": proc.returncode == 0, "exit_code": proc.returncode}}

          release_check = payload.get("release_check", {}) if isinstance(payload, dict) else {}
          if isinstance(release_check, dict):
              release_check.setdefault("exit_code", proc.returncode)
              if stderr:
                  release_check.setdefault("stderr", stderr)
              payload["release_check"] = release_check

          out_path.write_text(json.dumps(payload, indent=2) + "\n")

          rc = int(release_check.get("exit_code", proc.returncode)) if isinstance(release_check, dict) else proc.returncode
          if summary_path:
              with summary_path.open("a") as f:
                  f.write("### release-check preview (advisory)\n")
                  f.write(f"- exit_code: `{rc}`\n")
                  f.write(f"- changed_files: `{len(changed)}`\n")
                  if isinstance(release_check, dict):
                      classification = release_check.get("classification")
                      if isinstance(classification, dict):
                          files = classification.get("files", 0)
                          public = classification.get("public", 0)
                          private = classification.get("private", 0)
                          review = classification.get("review", 0)
                          f.write(
                              f"- classification: files={files}, public={public}, private={private}, review={review}\n"
                          )

          if rc != 0:
              print(
                  f"::warning::release-check preview flagged this diff (exit {rc}); advisory-only in CI."
              )

          raise SystemExit(0)
          PY

      - name: Upload release-check preview artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-check-preview
          path: .release-check.json
          if-no-files-found: warn

  assay-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install assay
        run: pip install "assay-ai==1.22.0"

      - name: Save baseline on first run
        run: |
          mkdir -p .assay
          if [ ! -f .assay/score-baseline.json ]; then
            echo "No baseline found, saving initial baseline."
            assay gate save-baseline . --json | tee .assay/save-baseline.json
          else
            echo '{"saved": false, "reason": "baseline_exists"}' > .assay/save-baseline.json
          fi

      - name: Run evidence gate
        run: |
          mkdir -p .assay
          assay lock check assay.lock --json | tee .assay/lock-check.json
          assay gate check . --min-score 0 --json | tee .assay/gate-check.json

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assay-gate-report
          path: .assay
          if-no-files-found: warn

  assay-verify:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install assay
        run: pip install "assay-ai==1.22.0"

      - name: Import signer and bootstrap trust overlay
        env:
          ASSAY_SIGNER_KEY_B64: ${{ secrets.ASSAY_SIGNER_KEY_B64 }}
          ASSAY_SIGNER_PUB_B64: ${{ secrets.ASSAY_SIGNER_PUB_B64 }}
          ASSAY_CI_ORG_SIGNER_FINGERPRINT: ${{ vars.ASSAY_CI_ORG_SIGNER_FINGERPRINT }}
        run: |
          set -euo pipefail
          if [ -z "${ASSAY_SIGNER_KEY_B64:-}" ] || [ -z "${ASSAY_SIGNER_PUB_B64:-}" ]; then
            echo "Missing ASSAY_SIGNER_KEY_B64 or ASSAY_SIGNER_PUB_B64 secret."
            exit 1
          fi
          mkdir -p .assay-signing
          printf '%s' "$ASSAY_SIGNER_PUB_B64" > .assay-signing/ci-assay-signer.pub.b64
          printf '%s' "$ASSAY_SIGNER_KEY_B64" > .assay-signing/ci-assay-signer.key.b64
          assay key import .assay-signing/ci-assay-signer.pub.b64 \
            --private .assay-signing/ci-assay-signer.key.b64 \
            --signer ci-assay-signer \
            --set-active \
            --json > .assay-signing/import.json

          # Assert imported fingerprint matches repo-pinned expectation
          FINGERPRINT=$(python3 -c "import json; print(json.load(open('.assay-signing/import.json'))['fingerprint'])")
          if [ -z "${ASSAY_CI_ORG_SIGNER_FINGERPRINT:-}" ]; then
            echo "::error::ASSAY_CI_ORG_SIGNER_FINGERPRINT repo variable not set. Cannot verify signer identity."
            exit 1
          fi
          if [ "$FINGERPRINT" != "$ASSAY_CI_ORG_SIGNER_FINGERPRINT" ]; then
            echo "::error::Fingerprint mismatch: imported=$FINGERPRINT expected=$ASSAY_CI_ORG_SIGNER_FINGERPRINT"
            exit 1
          fi
          echo "Fingerprint verified: ${FINGERPRINT:0:16}..."

          # Bootstrap trust policy overlay with ci-org signer using assay's bootstrap module
          export OVERLAY_DIR="$RUNNER_TEMP/ci-org-trust"
          export VERIFIED_FINGERPRINT="$FINGERPRINT"
          python3 -c "
          import hashlib, os
          from pathlib import Path
          from assay.trust.ci_org_bootstrap import write_ci_org_policy_overlay
          fp = os.environ['VERIFIED_FINGERPRINT']
          overlay = write_ci_org_policy_overlay(
              policy_dir=Path('trust'),
              output_dir=Path(os.environ['OVERLAY_DIR']),
              signer_id='ci-assay-signer',
              fingerprint=fp,
          )
          # Receipt: log overlay details for auditability
          signers_hash = hashlib.sha256(
              (overlay / 'signers.yaml').read_bytes()
          ).hexdigest()[:16]
          print(f'Trust overlay: path={overlay}')
          print(f'  signer_id=ci-assay-signer')
          print(f'  fingerprint={fp[:16]}...')
          print(f'  signers.yaml hash={signers_hash}')
          "

      - name: Build and verify proof pack with trust gate
        run: |
          set -euo pipefail
          mkdir -p .assay-verify

          assay run \
            -c receipt_completeness \
            --allow-empty \
            --output ".assay-verify/proof_pack_ci" \
            --json \
            -- python -c "print('agentmesh assay verify canary')" \
            | tee ".assay-verify/run.json"

          assay verify-pack ".assay-verify/proof_pack_ci" \
            --lock assay.lock \
            --max-age-hours 24 \
            --require-ci-binding \
            --expected-commit-sha "$GITHUB_SHA" \
            --trust-target ci_gate \
            --trust-policy-dir "$RUNNER_TEMP/ci-org-trust" \
            --enforce-trust-gate \
            --json | tee ".assay-verify/verify.json"

          # Extract trust decision into stable-schema artifact
          python3 << 'TRUSTPY'
          import json, os, sys
          from datetime import datetime, timezone

          verify = json.load(open('.assay-verify/verify.json'))
          trust = verify.get('trust') or {}
          acceptance = trust.get('acceptance') or {}
          raw_decision = acceptance.get('decision', 'not_evaluated')

          # Map to canonical enum: ACCEPT | REJECT | INCONCLUSIVE
          DECISION_MAP = {
              'accept': 'ACCEPT',
              'reject': 'REJECT',
              'warn': 'INCONCLUSIVE',
              'not_evaluated': 'INCONCLUSIVE',
          }
          decision = DECISION_MAP.get(raw_decision, 'INCONCLUSIVE')

          import re
          ref = os.environ.get('GITHUB_REF', '')
          m = re.match(r'refs/pull/(\d+)/', ref)
          pr_number = int(m.group(1)) if m else 0

          signer_id = (trust.get('authorization') or {}).get('signer_id', '')

          result = {
              'schema_version': '1',
              'trust_decision': decision,
              'raw_decision': raw_decision,
              'reason': acceptance.get('reason', ''),
              'fingerprint_verified': bool(os.environ.get('VERIFIED_FINGERPRINT')),
              'fingerprint_prefix': os.environ.get('VERIFIED_FINGERPRINT', '')[:16],
              'signer_id': signer_id,
              'authorization_status': (trust.get('authorization') or {}).get('status', ''),
              'source': 'ci_structured_artifact',
              'workflow_run_id': os.environ.get('GITHUB_RUN_ID', ''),
              'job_id': os.environ.get('GITHUB_JOB', ''),
              'commit_sha': os.environ.get('GITHUB_SHA', ''),
              'pr_number': pr_number,
              'verified_at': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
          }

          out_path = '.assay-verify/trust_result.json'
          with open(out_path, 'w') as f:
              json.dump(result, f, indent=2)
              f.write('\n')

          # Human-readable output
          print(f"Trust decision: {decision} (raw: {raw_decision})")
          print(f"Written to {out_path}")

          # Machine-parseable sentinel for log scraping fallback (versioned)
          sentinel = json.dumps({'v': 1, 'd': decision, 'fp': result['fingerprint_verified'], 'sid': signer_id})
          print(f'TRUST_RESULT_V1 {sentinel}')

          if decision == 'REJECT':
              print('::error::Trust gate rejected the proof pack')
              sys.exit(1)
          TRUSTPY

      - name: Upload verify artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assay-verify-report
          path: .assay-verify/
          if-no-files-found: warn

  agentmesh-assay-pack:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AgentMesh and Assay
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,assay]"

      - name: Build, verify, and replay AgentMesh Assay proof pack
        env:
          AGENTMESH_DATA_DIR: ${{ github.workspace }}/.agentmesh-ci
          AGENTMESH_AGENT_ID: ci_assay_pack
        run: |
          set -euo pipefail
          mkdir -p .assay-verify "$AGENTMESH_DATA_DIR"

          git config user.email "agentmesh-ci@example.invalid"
          git config user.name "AgentMesh CI"

          agentmesh episode start --title "CI AgentMesh Assay proof pack"
          EPISODE_ID="$(cat "$AGENTMESH_DATA_DIR/current_episode")"

          bash scripts/episode.sh
          test -s outputs/episode_output.json
          test -s results.xml

          git add outputs results.xml
          agentmesh commit \
            --message "ci canonical AgentMesh episode" \
            --no-episode-trailer \
            --emit-assay \
            --assay-command assay-gate-check \
            --assay-required

          agentmesh episode assay-pack "$EPISODE_ID" \
            --outputs outputs \
            --results results.xml \
            --episode-script scripts/episode.sh \
            --out ".assay-verify/proof_pack_ci" \
            --json \
            | tee ".assay-verify/pack.json"

          assay verify-pack ".assay-verify/proof_pack_ci" \
            --json | tee ".assay-verify/verify.json"
          bash ".assay-verify/proof_pack_ci/_unsigned/agentmesh/replay-from-proof.sh" \
            ".assay-verify/proof_pack_ci" \
            | tee ".assay-verify/replay.json"

      - name: Upload AgentMesh proof-pack artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentmesh-assay-proof-pack
          path: .assay-verify/
          if-no-files-found: warn

  weave-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Verify weave tamper detection
        env:
          AGENTMESH_DATA_DIR: ${{ github.workspace }}/.agentmesh-ci
          AGENTMESH_AGENT_ID: ci_weave_guard
        run: |
          set -euo pipefail

          agentmesh weave record --trace-id ci.weave.1 | tee -a weave-verify.log
          agentmesh weave record --trace-id ci.weave.2 | tee -a weave-verify.log
          agentmesh weave verify | tee -a weave-verify.log

          python - <<'PY'
          import os
          import sqlite3
          from pathlib import Path

          db_path = Path(os.environ["AGENTMESH_DATA_DIR"]) / "board.db"
          conn = sqlite3.connect(str(db_path))
          try:
              row = conn.execute(
                  "SELECT event_id FROM weave_events ORDER BY created_at DESC LIMIT 1"
              ).fetchone()
              if row is None:
                  raise SystemExit("no weave events to tamper")
              conn.execute(
                  "UPDATE weave_events SET event_hash = ? WHERE event_id = ?",
                  ("sha256:deadbeef", row[0]),
              )
              conn.commit()
          finally:
              conn.close()
          PY

          set +e
          agentmesh weave verify >> weave-verify.log 2>&1
          verify_status=$?
          set -e

          if [ "$verify_status" -eq 0 ]; then
            echo "Expected weave verify to fail after tamper, got success." | tee -a weave-verify.log
            exit 1
          fi
          echo "Tamper detection verified (non-zero exit: $verify_status)." | tee -a weave-verify.log

      - name: Upload weave integrity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weave-integrity
          path: |
            weave-verify.log
            .agentmesh-ci/events.jsonl
            .agentmesh-ci/board.db

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q

  package-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          pip install build
          python -m build

      - name: Install wheel in clean venv
        run: |
          python -m venv .pkg-venv
          . .pkg-venv/bin/activate
          pip install dist/*.whl

      - name: Smoke test packaged CLI
        run: |
          . .pkg-venv/bin/activate
          agentmesh --version
          agentmesh >/dev/null
          agentmesh doctor --help
          agentmesh mcp --help
          agentmesh orch --help
          agentmesh watchdog --help
